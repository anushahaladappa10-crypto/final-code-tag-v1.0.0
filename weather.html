<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App | Travel Explorer</title>
<meta name="description" content="Travel Explorer Hub helps users explore destinations, check weather, and manage travel plans with an interactive travel checklist.">

<meta name="keywords" content="Travel, Tourism, Weather App, Todo List, HTML, CSS, JavaScript, Travel Explorer">

<meta name="author" content="Anusha Haladappa">
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">
        Travel Explorer<span>.</span>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="weather.html">Weather</a>
        <a href="todo.html">Todo</a>
        <a href="contact.html">Contact</a>
    </nav>

    <button id="themeBtn">🌙</button>

</header>

<section class="container">

    <h1 class="section-title">🌤 Weather App</h1>

    <div class="contact-box">

       <input
type="text"
id="city"
placeholder="Enter City Name"
aria-label="Enter City Name">

<button
class="btn"
id="searchBtn"
aria-label="Search Weather">
            Search Weather
        </button>

    </div>

    <div id="weatherResult" class="card">

        <h2 id="cityName"></h2>

        <p id="temperature"></p>

        <p id="humidity"></p>

        <p id="wind"></p>

        <p id="condition"></p>

    </div>

</section>

<footer>

    🌍 Travel Explorer Hub

    <br><br>

    Explore • Dream • Discover

</footer>

<script src="script.js"></script>

</body>
</html>
